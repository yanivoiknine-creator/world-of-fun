<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק זיכרון - עולם של תמונות</title>
    <link rel="icon" href="logos/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 1;
            min-height: calc(100vh - 200px);
        }

        .game-back {
            align-self: flex-start;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 10px;
            transition: color 0.2s;
        }

        .game-back:hover {
            color: var(--accent-1);
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-title {
            font-size: 2.2rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .start-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .mode-section {
            margin-bottom: 28px;
        }

        .mode-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .mode-btn:hover {
            border-color: var(--accent-1);
            background: var(--bg-secondary);
        }

        .mode-btn.active {
            background: var(--accent-1);
            color: white;
            border-color: var(--accent-1);
        }

        .difficulty-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diff-btn {
            padding: 16px 28px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            min-width: 120px;
        }

        .diff-btn:hover {
            background: var(--accent-1);
            color: white;
            border-color: var(--accent-1);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-color);
        }

        .diff-emoji {
            display: block;
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .diff-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 400;
        }

        .diff-btn:hover .diff-label {
            color: rgba(255,255,255,0.8);
        }

        /* Game Area */
        .game-area {
            display: none;
            width: 100%;
            max-width: 520px;
        }

        .game-area.active {
            display: block;
        }

        /* Turn Indicator */
        .turn-indicator {
            text-align: center;
            padding: 10px 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: none;
        }

        .turn-indicator.active {
            display: block;
        }

        .turn-indicator.player-turn {
            background: var(--accent-1);
            color: white;
        }

        .turn-indicator.computer-turn {
            background: var(--accent-2);
            color: white;
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--bg-card);
            padding: 8px 18px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-primary);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .stat.highlight {
            border-color: var(--accent-1);
            box-shadow: 0 2px 12px var(--shadow-color);
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-1);
        }

        .game-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .game-btn {
            padding: 8px 18px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .game-btn:hover {
            background: var(--accent-1);
            color: white;
            border-color: var(--accent-1);
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            gap: 10px;
            perspective: 1000px;
            direction: ltr;
        }

        .card-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
        .card-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

        .memory-card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: 12px;
        }

        .memory-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .memory-card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            border: 2px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .card-front {
            background: var(--accent-1);
            color: white;
            font-size: 1.8rem;
        }

        .card-back {
            background: var(--bg-card);
            transform: rotateY(180deg);
        }

        .memory-card.matched-player .card-back {
            background: var(--bg-secondary);
            border-color: var(--accent-1);
        }

        .memory-card.matched-computer .card-back {
            background: var(--bg-secondary);
            border-color: var(--accent-2);
            opacity: 0.7;
        }

        .memory-card.matched {
            animation: matchPop 0.4s ease;
        }

        @keyframes matchPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .memory-card.wrong .card-inner {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-6px); }
            75% { transform: rotateY(180deg) translateX(6px); }
        }

        /* Win Overlay */
        .win-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .win-overlay.active {
            display: flex;
        }

        .win-box {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .win-emoji {
            font-size: 3.5rem;
            margin-bottom: 12px;
        }

        .win-title {
            font-size: 1.6rem;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .win-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .win-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .win-stat {
            text-align: center;
        }

        .win-stat-value {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-1);
        }

        .win-stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .win-best {
            color: var(--accent-2);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .win-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .win-btn {
            padding: 12px 24px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .win-btn.primary {
            background: var(--accent-1);
            color: white;
            border-color: var(--accent-1);
        }

        .win-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card-grid { gap: 6px; }
            .card-front, .card-back { font-size: 1.6rem; border-radius: 8px; }
            .card-inner { border-radius: 8px; }
            .card-front { font-size: 1.3rem; }
            .start-title { font-size: 1.7rem; }
            .game-area { max-width: 100%; }
        }
    </style>
</head>
<body class="theme-purple-pink">

    <!-- Background Decorations -->
    <div class="bg-decorations" id="bgDecorations"></div>

    <!-- Site Navigation -->
    <nav class="site-nav">
        <a href="index.html" class="nav-link">גלריה</a>
        <a href="games.html" class="nav-link active">משחקים</a>
    </nav>

    <!-- Header -->
    <header class="site-header">
        <div class="header-content">
            <img src="logos/logo.png" alt="עולם של תמונות" class="logo">
            <h1 class="site-title">עולם של תמונות</h1>
        </div>
        <div class="theme-switcher">
            <span class="theme-label">בחרי ערכת צבעים:</span>
            <button class="theme-btn theme-btn-purple" data-theme="theme-purple-pink" title="סגול וורוד">
                <span class="color-dot purple"></span>
                <span class="color-dot pink"></span>
            </button>
            <button class="theme-btn theme-btn-bw" data-theme="theme-black-white" title="שחור ולבן">
                <span class="color-dot black"></span>
                <span class="color-dot white"></span>
            </button>
            <button class="theme-btn theme-btn-yellow" data-theme="theme-yellow-green" title="צהוב וירוק">
                <span class="color-dot yellow"></span>
                <span class="color-dot green"></span>
            </button>
        </div>
    </header>

    <div class="game-wrapper">
        <a href="games.html" class="game-back">&#8592; חזרה למשחקים</a>

        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <div class="start-title">🃏 משחק זיכרון</div>
            <div class="start-subtitle">הפכי קלפים ומצאי את הזוגות התואמים!</div>

            <div class="mode-section">
                <div class="mode-label">מצב משחק:</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="solo">🧍 לבד</button>
                    <button class="mode-btn" data-mode="vs">🤖 נגד המחשב</button>
                </div>
            </div>

            <div class="difficulty-buttons">
                <button class="diff-btn" data-difficulty="easy">
                    <span class="diff-emoji">😊</span>
                    קל
                    <span class="diff-label">12 קלפים</span>
                </button>
                <button class="diff-btn" data-difficulty="medium">
                    <span class="diff-emoji">🤔</span>
                    בינוני
                    <span class="diff-label">16 קלפים</span>
                </button>
                <button class="diff-btn" data-difficulty="hard">
                    <span class="diff-emoji">🧠</span>
                    קשה
                    <span class="diff-label">20 קלפים</span>
                </button>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area" id="gameArea">
            <div class="turn-indicator" id="turnIndicator"></div>
            <div class="game-stats" id="gameStats">
                <div class="stat">מהלכים: <span class="stat-value" id="moveCount">0</span></div>
                <div class="stat">זמן: <span class="stat-value" id="timer">0:00</span></div>
                <div class="stat">זוגות: <span class="stat-value" id="pairCount">0/0</span></div>
            </div>
            <div class="game-stats" id="vsStats" style="display:none">
                <div class="stat highlight" id="playerStat">🧍 את: <span class="stat-value" id="playerScore">0</span></div>
                <div class="stat" id="computerStat">🤖 מחשב: <span class="stat-value" id="computerScore">0</span></div>
                <div class="stat">נותרו: <span class="stat-value" id="remainingPairs">0</span></div>
            </div>
            <div class="game-actions">
                <button class="game-btn" id="resetBtn">התחלה מחדש</button>
                <button class="game-btn" id="backBtn">בחירת רמה</button>
            </div>
            <div class="card-grid" id="cardGrid"></div>
        </div>
    </div>

    <!-- Win Overlay -->
    <div class="win-overlay" id="winOverlay">
        <div class="win-box">
            <div class="win-emoji" id="winEmoji">🎉</div>
            <div class="win-title" id="winTitle">כל הכבוד!</div>
            <div class="win-subtitle" id="winSubtitle">מצאת את כל הזוגות!</div>
            <div class="win-stats" id="winStats">
                <div class="win-stat">
                    <span class="win-stat-value" id="winMoves">0</span>
                    <span class="win-stat-label" id="winMovesLabel">מהלכים</span>
                </div>
                <div class="win-stat">
                    <span class="win-stat-value" id="winTime">0:00</span>
                    <span class="win-stat-label" id="winTimeLabel">זמן</span>
                </div>
            </div>
            <div class="win-best" id="winBest"></div>
            <div class="win-buttons">
                <button class="win-btn primary" id="playAgainBtn">שחקי שוב</button>
                <button class="win-btn" id="changeDiffBtn">שני רמה</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <p>עולם של תמונות &copy; 2026 | נבנה באהבה 💗</p>
    </footer>

    <script>
        // === Background Decorations ===
        function createDecorations() {
            const container = document.getElementById('bgDecorations');
            container.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const isCherry = i % 2 === 0;
                const el = document.createElement('div');
                el.className = 'bg-deco ' + (isCherry ? 'bg-cherry' : 'bg-bow');
                el.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;width:' + (55+Math.random()*45) + 'px;height:' + (55+Math.random()*45) + 'px;opacity:' + (0.09+Math.random()*0.08) + ';transform:rotate(' + (Math.random()*360) + 'deg)';
                if (isCherry) {
                    el.innerHTML = '<svg viewBox="0 0 40 40"><circle cx="14" cy="28" r="9"/><circle cx="28" cy="24" r="9"/><path d="M14,19 Q18,5 22,8 Q26,5 28,15" stroke-width="2.5"/></svg>';
                } else {
                    el.innerHTML = '<svg viewBox="0 0 40 30"><path class="bow-wing" d="M20,15 Q5,3 5,15 Q5,27 20,15"/><path class="bow-wing" d="M20,15 Q35,3 35,15 Q35,27 20,15"/><circle class="bow-center" cx="20" cy="15" r="4"/></svg>';
                }
                container.appendChild(el);
            }
        }
        createDecorations();

        // === Theme Switching ===
        const themeBtns = document.querySelectorAll('.theme-btn');
        const savedTheme = localStorage.getItem('selectedTheme') || 'theme-purple-pink';
        document.body.className = savedTheme;
        themeBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === savedTheme);
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                document.body.className = theme;
                localStorage.setItem('selectedTheme', theme);
                themeBtns.forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
            });
        });

        // === Game Logic ===
        const allEmojis = ['🐱', '🐶', '🦋', '🐻', '🌸', '🍒', '🌈', '🍰', '💎', '🦄'];
        const difficulties = {
            easy:   { pairs: 6, cols: 3 },
            medium: { pairs: 8, cols: 4 },
            hard:   { pairs: 10, cols: 4 },
        };

        let currentDifficulty = null;
        let gameMode = 'solo'; // 'solo' or 'vs'
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let moves = 0;
        let timerInterval = null;
        let seconds = 0;
        let isLocked = false;

        // VS mode state
        let currentTurn = 'player'; // 'player' or 'computer'
        let playerScore = 0;
        let computerScore = 0;
        let computerMemory = {}; // index -> emoji (what the computer remembers)
        const COMPUTER_MEMORY_CHANCE = 0.7; // 70% chance to remember a card

        const startScreen = document.getElementById('startScreen');
        const gameArea = document.getElementById('gameArea');
        const cardGrid = document.getElementById('cardGrid');
        const moveCountEl = document.getElementById('moveCount');
        const timerEl = document.getElementById('timer');
        const pairCountEl = document.getElementById('pairCount');
        const winOverlay = document.getElementById('winOverlay');
        const turnIndicator = document.getElementById('turnIndicator');

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                gameMode = btn.dataset.mode;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Difficulty buttons
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentDifficulty = btn.dataset.difficulty;
                startGame();
            });
        });

        // Reset button
        document.getElementById('resetBtn').addEventListener('click', startGame);

        // Back to start
        document.getElementById('backBtn').addEventListener('click', () => {
            stopTimer();
            gameArea.classList.remove('active');
            startScreen.style.display = '';
        });

        // Win overlay buttons
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            winOverlay.classList.remove('active');
            startGame();
        });

        document.getElementById('changeDiffBtn').addEventListener('click', () => {
            winOverlay.classList.remove('active');
            stopTimer();
            gameArea.classList.remove('active');
            startScreen.style.display = '';
        });

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            const diff = difficulties[currentDifficulty];
            totalPairs = diff.pairs;
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            flippedCards = [];
            isLocked = false;
            currentTurn = 'player';
            playerScore = 0;
            computerScore = 0;
            computerMemory = {};

            stopTimer();

            // Show/hide appropriate stats
            if (gameMode === 'vs') {
                document.getElementById('gameStats').style.display = 'none';
                document.getElementById('vsStats').style.display = '';
                turnIndicator.classList.add('active');
                updateTurnIndicator();
                updateVsStats();
            } else {
                document.getElementById('gameStats').style.display = '';
                document.getElementById('vsStats').style.display = 'none';
                turnIndicator.classList.remove('active');
                updateSoloStats();
            }

            // Show game area, hide start screen
            startScreen.style.display = 'none';
            gameArea.classList.add('active');

            // Set grid columns
            cardGrid.className = 'card-grid cols-' + diff.cols;

            // Pick emojis and create pairs
            const emojis = shuffle([...allEmojis]).slice(0, diff.pairs);
            cards = shuffle([...emojis, ...emojis]);

            // Build grid
            cardGrid.innerHTML = '';
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                card.innerHTML =
                    '<div class="card-inner">' +
                        '<div class="card-front">❓</div>' +
                        '<div class="card-back">' + emoji + '</div>' +
                    '</div>';
                card.addEventListener('click', () => onCardClick(card));
                cardGrid.appendChild(card);
            });

            timerInterval = null;
        }

        function onCardClick(card) {
            if (gameMode === 'vs' && currentTurn === 'computer') return;
            flipCard(card);
        }

        function flipCard(card) {
            if (isLocked) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            // Start timer on first move (solo mode)
            if (gameMode === 'solo' && moves === 0 && !timerInterval) {
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            // Computer remembers this card
            if (gameMode === 'vs' && Math.random() < COMPUTER_MEMORY_CHANCE) {
                computerMemory[card.dataset.index] = card.dataset.emoji;
            }

            if (flippedCards.length === 2) {
                moves++;
                if (gameMode === 'solo') {
                    moveCountEl.textContent = moves;
                }
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;

                if (gameMode === 'vs') {
                    if (currentTurn === 'player') {
                        playerScore++;
                        card1.classList.add('matched-player');
                        card2.classList.add('matched-player');
                    } else {
                        computerScore++;
                        card1.classList.add('matched-computer');
                        card2.classList.add('matched-computer');
                    }
                    // Remove from computer memory
                    delete computerMemory[card1.dataset.index];
                    delete computerMemory[card2.dataset.index];
                    updateVsStats();
                } else {
                    card1.classList.add('matched-player');
                    card2.classList.add('matched-player');
                    pairCountEl.textContent = matchedPairs + '/' + totalPairs;
                }

                flippedCards = [];

                if (matchedPairs === totalPairs) {
                    stopTimer();
                    setTimeout(showWin, 600);
                } else if (gameMode === 'vs') {
                    // Same player goes again after a match
                    if (currentTurn === 'computer') {
                        setTimeout(computerTurn, 800);
                    }
                }
            } else {
                isLocked = true;
                card1.classList.add('wrong');
                card2.classList.add('wrong');
                setTimeout(() => {
                    card1.classList.remove('flipped', 'wrong');
                    card2.classList.remove('flipped', 'wrong');
                    flippedCards = [];
                    isLocked = false;

                    if (gameMode === 'vs') {
                        // Switch turns
                        currentTurn = currentTurn === 'player' ? 'computer' : 'player';
                        updateTurnIndicator();
                        if (currentTurn === 'computer') {
                            setTimeout(computerTurn, 700);
                        }
                    }
                }, 800);
            }
        }

        // === Computer AI ===
        function computerTurn() {
            if (matchedPairs === totalPairs) return;
            isLocked = true;

            const unmatchedCards = getUnmatchedCards();
            if (unmatchedCards.length < 2) return;

            // Check if computer knows a matching pair
            let knownPair = findKnownPair(unmatchedCards);

            let pick1, pick2;
            if (knownPair) {
                pick1 = knownPair[0];
                pick2 = knownPair[1];
            } else {
                // Pick randomly, but prefer unknown cards
                const unknownCards = unmatchedCards.filter(c => !(c.dataset.index in computerMemory));
                const pool = unknownCards.length >= 2 ? unknownCards : unmatchedCards;
                const shuffled = shuffle([...pool]);
                pick1 = shuffled[0];
                pick2 = shuffled[1];
                if (pick1 === pick2) pick2 = shuffled[2] || unmatchedCards.find(c => c !== pick1);
            }

            // Flip first card
            setTimeout(() => {
                isLocked = false;
                flipCard(pick1);
                // Flip second card after a delay
                setTimeout(() => {
                    flipCard(pick2);
                }, 600);
            }, 400);
        }

        function getUnmatchedCards() {
            return Array.from(cardGrid.querySelectorAll('.memory-card:not(.matched)'));
        }

        function findKnownPair(unmatchedCards) {
            const unmatchedIndices = new Set(unmatchedCards.map(c => c.dataset.index));
            const emojiToIndices = {};

            for (const [index, emoji] of Object.entries(computerMemory)) {
                if (!unmatchedIndices.has(index)) continue;
                if (!emojiToIndices[emoji]) emojiToIndices[emoji] = [];
                emojiToIndices[emoji].push(index);
            }

            for (const [emoji, indices] of Object.entries(emojiToIndices)) {
                if (indices.length >= 2) {
                    const card1 = cardGrid.querySelector('[data-index="' + indices[0] + '"]');
                    const card2 = cardGrid.querySelector('[data-index="' + indices[1] + '"]');
                    if (card1 && card2) return [card1, card2];
                }
            }
            return null;
        }

        function updateTurnIndicator() {
            if (currentTurn === 'player') {
                turnIndicator.className = 'turn-indicator active player-turn';
                turnIndicator.textContent = '🧍 התור שלך!';
            } else {
                turnIndicator.className = 'turn-indicator active computer-turn';
                turnIndicator.textContent = '🤖 המחשב חושב...';
            }
        }

        function updateVsStats() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
            document.getElementById('remainingPairs').textContent = (totalPairs - matchedPairs);
        }

        function updateSoloStats() {
            moveCountEl.textContent = moves;
            timerEl.textContent = formatTime(seconds);
            pairCountEl.textContent = matchedPairs + '/' + totalPairs;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                timerEl.textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = s % 60;
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function showWin() {
            const winEmoji = document.getElementById('winEmoji');
            const winTitle = document.getElementById('winTitle');
            const winSubtitle = document.getElementById('winSubtitle');
            const winStats = document.getElementById('winStats');
            const bestEl = document.getElementById('winBest');

            if (gameMode === 'vs') {
                // VS mode results
                if (playerScore > computerScore) {
                    winEmoji.textContent = '🎉';
                    winTitle.textContent = 'ניצחת!';
                    winSubtitle.textContent = 'הבסת את המחשב!';
                } else if (computerScore > playerScore) {
                    winEmoji.textContent = '🤖';
                    winTitle.textContent = 'המחשב ניצח';
                    winSubtitle.textContent = 'נסי שוב, את יכולה!';
                } else {
                    winEmoji.textContent = '🤝';
                    winTitle.textContent = 'תיקו!';
                    winSubtitle.textContent = 'מרשים! שיחקת כמו המחשב!';
                }

                document.getElementById('winMoves').textContent = playerScore;
                document.getElementById('winMovesLabel').textContent = 'הזוגות שלך';
                document.getElementById('winTime').textContent = computerScore;
                document.getElementById('winTimeLabel').textContent = 'זוגות המחשב';
                bestEl.textContent = '';
            } else {
                // Solo mode results
                winEmoji.textContent = '🎉';
                winTitle.textContent = 'כל הכבוד!';
                winSubtitle.textContent = 'מצאת את כל הזוגות!';

                document.getElementById('winMoves').textContent = moves;
                document.getElementById('winMovesLabel').textContent = 'מהלכים';
                document.getElementById('winTime').textContent = formatTime(seconds);
                document.getElementById('winTimeLabel').textContent = 'זמן';

                const key = 'memoryBest_' + currentDifficulty;
                const prevBest = parseInt(localStorage.getItem(key) || '0');

                if (prevBest === 0 || moves < prevBest) {
                    localStorage.setItem(key, moves);
                    if (prevBest > 0) {
                        bestEl.textContent = '🏆 שיא חדש! (קודם: ' + prevBest + ' מהלכים)';
                    } else {
                        bestEl.textContent = '🏆 השיא הראשון שלך!';
                    }
                } else {
                    bestEl.textContent = 'השיא שלך: ' + prevBest + ' מהלכים';
                }
            }

            winOverlay.classList.add('active');
        }
    </script>
</body>
