<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אבן נייר מספריים - עולם של כייף</title>
    <link rel="icon" href="logos/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrap { max-width: 500px; margin: 0 auto; padding: 30px 20px; position: relative; z-index: 1; text-align: center; }
        .game-h { font-size: 1.7rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
        .game-sub { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; }
        .score-bar {
            display: flex; justify-content: center; gap: 30px;
            margin-bottom: 24px;
        }
        .score-box {
            background: var(--bg-card); border: 1.5px solid var(--border-color);
            border-radius: 12px; padding: 10px 22px; min-width: 90px;
        }
        .score-name { font-size: 0.8rem; color: var(--text-secondary); }
        .score-num { font-size: 2rem; font-weight: 700; color: var(--accent-1); }
        .choices {
            display: flex; justify-content: center; gap: 16px;
            margin-bottom: 28px; flex-wrap: wrap;
        }
        .choice-btn {
            width: 110px; height: 110px; border-radius: 20px;
            border: 2px solid var(--border-color); background: var(--bg-card);
            font-size: 3.5rem; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 4px;
        }
        .choice-btn span.label { font-size: 0.75rem; color: var(--text-secondary); font-family: inherit; }
        .choice-btn:hover { transform: scale(1.08); border-color: var(--accent-1); box-shadow: 0 6px 20px var(--shadow-color); background: var(--bg-secondary); }
        .choice-btn:active { transform: scale(0.97); }
        .arena {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; margin-bottom: 22px; min-height: 100px;
        }
        .arena-side { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
        .arena-icon { font-size: 4rem; transition: all 0.3s; }
        .arena-icon.shake { animation: shake 0.4s; }
        @keyframes shake {
            0%,100% { transform: rotate(0); } 25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }
        .arena-label { font-size: 0.85rem; color: var(--text-secondary); }
        .arena-vs { font-size: 1.3rem; font-weight: 700; color: var(--text-secondary); }
        .result-box {
            min-height: 48px; border-radius: 12px; padding: 12px 20px;
            font-size: 1.2rem; font-weight: 700; margin-bottom: 16px;
            transition: all 0.3s;
        }
        .result-win { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
        .result-lose { background: #ffebee; color: #c62828; border: 1.5px solid #ef9a9a; }
        .result-tie { background: var(--bg-secondary); color: var(--text-primary); border: 1.5px solid var(--border-color); }
        .rounds-bar {
            display: flex; justify-content: center; gap: 8px;
            margin-bottom: 16px;
        }
        .round-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid var(--border-color); background: var(--bg-secondary);
        }
        .round-dot.win { background: #4caf50; border-color: #4caf50; }
        .round-dot.lose { background: #f44336; border-color: #f44336; }
        .round-dot.tie { background: #9e9e9e; border-color: #9e9e9e; }
        .reset-btn {
            padding: 10px 28px; border-radius: 10px; border: 1.5px solid var(--border-color);
            background: var(--btn-active); color: white; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all 0.2s; display: none;
        }
        .reset-btn:hover { opacity: 0.85; }
        .reset-btn.visible { display: inline-block; }
        .final-msg { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .back-btn {
            display: inline-block; margin-top: 20px; padding: 9px 22px;
            border-radius: 10px; background: var(--bg-secondary);
            color: var(--text-primary); text-decoration: none;
            border: 1.5px solid var(--border-color); font-size: 0.9rem;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--bg-card); border-color: var(--accent-1); }
    </style>
</head>
<body class="theme-purple-pink">
    <div class="bg-decorations" id="bgDecorations"></div>
    <nav class="site-nav">
        <a href="index.html" class="nav-link">גלריה</a>
        <a href="games.html" class="nav-link active">משחקים</a>
        <a href="drawing.html" class="nav-link">ציור</a>
    </nav>
    <header class="site-header">
        <div class="header-content">
            <img src="logos/logo.png" alt="עולם של כייף" class="logo">
            <h1 class="site-title">עולם של כייף</h1>
        </div>
        <div class="theme-switcher">
            <span class="theme-label">בחרי ערכת צבעים:</span>
            <button class="theme-btn theme-btn-purple" data-theme="theme-purple-pink" title="סגול וורוד"><span class="color-dot purple"></span><span class="color-dot pink"></span></button>
            <button class="theme-btn theme-btn-bw" data-theme="theme-black-white" title="שחור ולבן"><span class="color-dot black"></span><span class="color-dot white"></span></button>
            <button class="theme-btn theme-btn-yellow" data-theme="theme-yellow-green" title="צהוב וירוק"><span class="color-dot yellow"></span><span class="color-dot green"></span></button>
        </div>
    </header>

    <div class="game-wrap">
        <h2 class="game-h">✂️ אבן, נייר, מספריים</h2>
        <p class="game-sub">שחקי 5 סיבובים נגד המחשב — מי תנצח?</p>

        <div class="score-bar">
            <div class="score-box">
                <div class="score-name">את</div>
                <div class="score-num" id="scorePlayer">0</div>
            </div>
            <div class="score-box">
                <div class="score-name">תיקו</div>
                <div class="score-num" id="scoreTie">0</div>
            </div>
            <div class="score-box">
                <div class="score-name">מחשב</div>
                <div class="score-num" id="scoreCPU">0</div>
            </div>
        </div>

        <div class="rounds-bar" id="roundsBar">
            <div class="round-dot" id="dot0"></div>
            <div class="round-dot" id="dot1"></div>
            <div class="round-dot" id="dot2"></div>
            <div class="round-dot" id="dot3"></div>
            <div class="round-dot" id="dot4"></div>
        </div>

        <div class="arena">
            <div class="arena-side">
                <div class="arena-icon" id="playerIcon">❓</div>
                <div class="arena-label">את</div>
            </div>
            <div class="arena-vs">VS</div>
            <div class="arena-side">
                <div class="arena-icon" id="cpuIcon">❓</div>
                <div class="arena-label">מחשב</div>
            </div>
        </div>

        <div class="result-box result-tie" id="resultBox" style="visibility:hidden">בחרי!</div>

        <div class="choices" id="choicesArea">
            <button class="choice-btn" data-v="rock">🪨<span class="label">אבן</span></button>
            <button class="choice-btn" data-v="paper">📄<span class="label">נייר</span></button>
            <button class="choice-btn" data-v="scissors">✂️<span class="label">מספריים</span></button>
        </div>

        <div class="final-msg" id="finalMsg"></div>
        <button class="reset-btn" id="resetBtn" onclick="resetGame()">שחקי שוב!</button>
        <br>
        <a href="games.html" class="back-btn">← חזרה למשחקים</a>
    </div>

    <script>
        // Theme
        (function() {
            const t = localStorage.getItem('selectedTheme') || 'theme-purple-pink';
            document.body.className = t;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === t);
                btn.addEventListener('click', () => {
                    document.body.className = btn.dataset.theme;
                    localStorage.setItem('selectedTheme', btn.dataset.theme);
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === btn.dataset.theme));
                });
            });
            const c = document.getElementById('bgDecorations'); c.innerHTML = '';
            for (let i=0;i<18;i++){const e=document.createElement('div');e.className='bg-deco '+(i%2===0?'bg-cherry':'bg-bow');e.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(55+Math.random()*45)+'px;height:'+(55+Math.random()*45)+'px;opacity:'+(0.09+Math.random()*0.08)+';transform:rotate('+(Math.random()*360)+'deg)';e.innerHTML=i%2===0?'<svg viewBox="0 0 40 40"><circle cx="14" cy="28" r="9"/><circle cx="28" cy="24" r="9"/><path d="M14,19 Q18,5 22,8 Q26,5 28,15" stroke-width="2.5"/></svg>':'<svg viewBox="0 0 40 30"><path class="bow-wing" d="M20,15 Q5,3 5,15 Q5,27 20,15"/><path class="bow-wing" d="M20,15 Q35,3 35,15 Q35,27 20,15"/><circle class="bow-center" cx="20" cy="15" r="4"/></svg>';c.appendChild(e);}
        })();

        const ICONS = { rock: '🪨', paper: '📄', scissors: '✂️' };
        const NAMES = { rock: 'אבן', paper: 'נייר', scissors: 'מספריים' };
        const CHOICES = ['rock', 'paper', 'scissors'];

        let scores = { player: 0, tie: 0, cpu: 0 };
        let round = 0;
        let gameEnded = false;

        function play(playerChoice) {
            if (gameEnded) return;
            const cpuChoice = CHOICES[Math.floor(Math.random() * 3)];
            const playerIcon = document.getElementById('playerIcon');
            const cpuIcon = document.getElementById('cpuIcon');

            // Animate
            playerIcon.classList.remove('shake'); cpuIcon.classList.remove('shake');
            void playerIcon.offsetWidth;
            playerIcon.classList.add('shake'); cpuIcon.classList.add('shake');

            setTimeout(() => {
                playerIcon.textContent = ICONS[playerChoice];
                cpuIcon.textContent = ICONS[cpuChoice];

                const result = getResult(playerChoice, cpuChoice);
                const rb = document.getElementById('resultBox');
                rb.style.visibility = 'visible';

                let dotClass;
                if (result === 1) {
                    scores.player++;
                    rb.textContent = `ניצחת! ${NAMES[playerChoice]} מנצח ${NAMES[cpuChoice]} 🎉`;
                    rb.className = 'result-box result-win';
                    dotClass = 'win';
                } else if (result === -1) {
                    scores.cpu++;
                    rb.textContent = `המחשב ניצח! ${NAMES[cpuChoice]} מנצח ${NAMES[playerChoice]} 😢`;
                    rb.className = 'result-box result-lose';
                    dotClass = 'lose';
                } else {
                    scores.tie++;
                    rb.textContent = `תיקו! שניכן בחרתן ${NAMES[playerChoice]} 🤝`;
                    rb.className = 'result-box result-tie';
                    dotClass = 'tie';
                }

                document.getElementById(`dot${round}`).classList.add(dotClass);
                round++;

                document.getElementById('scorePlayer').textContent = scores.player;
                document.getElementById('scoreTie').textContent = scores.tie;
                document.getElementById('scoreCPU').textContent = scores.cpu;

                if (round >= 5) endGame();
            }, 400);
        }

        function getResult(p, c) {
            if (p === c) return 0;
            if ((p==='rock'&&c==='scissors')||(p==='scissors'&&c==='paper')||(p==='paper'&&c==='rock')) return 1;
            return -1;
        }

        function endGame() {
            gameEnded = true;
            document.getElementById('choicesArea').style.opacity = '0.4';
            document.getElementById('choicesArea').style.pointerEvents = 'none';
            const fm = document.getElementById('finalMsg');
            if (scores.player > scores.cpu) fm.textContent = '🏆 כל הכבוד! ניצחת את המחשב!';
            else if (scores.cpu > scores.player) fm.textContent = '😅 המחשב ניצח הפעם... נסי שוב!';
            else fm.textContent = '🤝 תיקו! היה קרוב!';
            document.getElementById('resetBtn').classList.add('visible');
        }

        function resetGame() {
            scores = { player: 0, tie: 0, cpu: 0 };
            round = 0; gameEnded = false;
            document.getElementById('scorePlayer').textContent = '0';
            document.getElementById('scoreTie').textContent = '0';
            document.getElementById('scoreCPU').textContent = '0';
            document.getElementById('playerIcon').textContent = '❓';
            document.getElementById('cpuIcon').textContent = '❓';
            document.getElementById('resultBox').style.visibility = 'hidden';
            document.getElementById('finalMsg').textContent = '';
            document.getElementById('resetBtn').classList.remove('visible');
            document.getElementById('choicesArea').style.opacity = '1';
            document.getElementById('choicesArea').style.pointerEvents = '';
            ['dot0','dot1','dot2','dot3','dot4'].forEach(id => {
                document.getElementById(id).className = 'round-dot';
            });
        }

        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', () => play(btn.dataset.v));
        });
    </script>
</body>
</html>
